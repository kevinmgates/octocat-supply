name: Create Feature Issue Backlog

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issues from backlog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = JSON.parse(fs.readFileSync('.github/issue-backlog.json', 'utf8'));

            for (const issue of issues) {
              // Use search API to check for exact title match across all issues
              const searchResult = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${issue.title}"`,
              });
              const exactMatch = searchResult.data.items.some(i => i.title === issue.title);
              if (exactMatch) {
                console.log(`Skipping (already exists): "${issue.title}"`);
                continue;
              }
              const result = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });
              console.log(`Created issue #${result.data.number}: ${issue.title}`);
            }
